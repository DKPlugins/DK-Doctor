# Встроенный профиль: DK_Animated_Icons (плагин автора DKPlugins).
#
# Плагин грузит кадры анимированных иконок в рантайме из настраиваемой папки
# `iconsFolder` по имени пресета (`ImageManager.loadBitmap(folder, filename)`),
# статически НЕ видимому отсюда. Файлы в этой подпапке — плагин-управляемые
# (не сироты).
#
# `default = img/system/` — стоковая папка вне сканируемых корней ассетов, поэтому
# при дефолте подавления нет (и сирот там нет — img/system не сканируется).
# Профиль срабатывает, только если автор перенёс иконки во вложенную подпапку
# `img/pictures/...` (тогда они стали бы сканироваться и ложно считаться сиротами).
name = "DK_Animated_Icons"
target = "both" # plugindesc: [MV|MZ]

[[provided_subdir]]
kind = "img/pictures"
param = "iconsFolder"
default = "img/system/"
