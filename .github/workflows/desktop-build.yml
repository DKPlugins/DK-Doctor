name: desktop-build

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache (isolated src-tauri target)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/desktop
        run: pnpm build

      - name: Tauri build (Windows NSIS)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop

      - name: Tauri build (macOS universal, ad-hoc signing)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No APPLE_* secrets => the bundler uses ad-hoc / no signing (acceptable for now).
        with:
          projectPath: apps/desktop
          args: --target universal-apple-darwin

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: dk-doctor-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
            apps/desktop/src-tauri/target/*/release/bundle/**/*
          if-no-files-found: warn
