# Host-neutral toolchain pin for the Tauri desktop app, kept in sync with the
# repository root. A bare version (not a host-specific channel name) resolves to
# each host's native toolchain, so the macOS CI leg builds without tripping over
# a Windows-only toolchain name, and offline checks do not re-resolve `stable`.
[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
