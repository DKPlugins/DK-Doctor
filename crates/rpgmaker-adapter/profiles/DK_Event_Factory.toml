# Встроенный профиль: DK_Event_Factory (плагин автора DKPlugins).
#
# Параметр `templates` (@type number[]) — id карт-источников шаблонных событий:
# плагин в рантайме копирует события с этих карт на другие (CreateEvent и т. п.).
# Сами карты-шаблоны игрок не посещает прямыми переходами, поэтому `unreachable-maps`
# ложно считал их недостижимыми. Объявляем `templates` как список используемых
# плагином карт → правило их пропускает.
#
# Действует и при ВЫКЛЮЧЕННОМ плагине: значение параметра — явное объявление автора
# (карта-шаблон существует намеренно), а `unreachable-maps` это INFO «возможно,
# открывается плагином».
name = "DK_Event_Factory"
target = "both"

[[map_param]]
param = "templates"
