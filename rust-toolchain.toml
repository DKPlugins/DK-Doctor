# Host-neutral Rust toolchain pin for reproducible builds.
#
# Pin an explicit version, NOT a host-specific channel name. rustup treats a
# value like `stable-x86_64-pc-windows-msvc` as a toolchain *name*, so it fails
# to resolve on non-Windows hosts (the macOS CI leg, a contributor on Linux) and
# also re-resolves the moving `stable` channel over the network. A bare version
# is host-neutral: on each platform it resolves to that platform's native
# toolchain. On Windows the default host is the MSVC ABI
# (`x86_64-pc-windows-msvc`), which keeps producing a clean exe — no gnullvm
# libunwind/std DLL bundling, no AV lock on the release binary.
#
# Cross-compilation targets (e.g. macOS in the desktop workflow) are installed
# separately by CI / release scripts.
#
# The gnullvm fallback in .cargo/config.toml stays as-is: its linker settings are
# scoped to the gnullvm target and do not apply to an MSVC build.
[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
