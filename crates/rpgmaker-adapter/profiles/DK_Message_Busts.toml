# Встроенный профиль: DK_Message_Busts (плагин автора DKPlugins).
#
# Плагин показывает бюсты вместо лица: грузит их в рантайме из настраиваемой
# папки `bustsFolder` по имени лица (`faceName`), статически НЕ видимому отсюда.
# Поэтому файлы в этой подпапке — плагин-управляемые (не сироты), даже если на
# них нет прямых ссылок из data-полей.
#
# `default = img/pictures/` намеренно НЕ срабатывает: на корне `img/pictures`
# бюст не отличить от обычной картинки, поэтому при стоковом значении подавления
# нет (пустая подпапка после снятия префикса → пропуск). Подавляются только
# вложенные подпапки (`img/pictures/busts/`, `img/pictures/faces/` и т. п.).
name = "DK_Message_Busts"
target = "both" # plugindesc: [MV|MZ]

[[provided_subdir]]
kind = "img/pictures"
param = "bustsFolder"
default = "img/pictures/"
